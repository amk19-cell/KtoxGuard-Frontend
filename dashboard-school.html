<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KToxGuard - School</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body{background:#0A0F1E;color:#F9FAFB;font-family:'Inter',sans-serif;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:2rem}
        .lang-selector button{background:#1F2937;border:none;padding:6px 12px;border-radius:20px;margin-left:8px;cursor:pointer;color:#fff}
        .active{background:#3B82F6}
        .stats-grid{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:2rem}
        .stat-card{background:#111827;padding:1rem;border-radius:20px;flex:1}
        .students-grid{display:flex;flex-wrap:wrap;gap:1rem;margin:1rem 0}
        .student-card{background:#111827;border-radius:20px;padding:1rem;width:150px;text-align:center;cursor:pointer}
        .threat-badge{font-size:0.7rem;padding:4px 8px;border-radius:20px;display:inline-block;margin-top:6px}
        .threat-low{background:#10B981}
        .alerts-panel{background:#111827;border-radius:20px;padding:1rem;border-left:4px solid #F59E0B;margin:1rem 0}
        .guidance-box{background:#1F2937;border-radius:16px;padding:1rem;margin:1rem 0}
        .btn{background:#3B82F6;border:none;padding:8px 16px;border-radius:40px;color:#fff;cursor:pointer}
        @media(max-width:640px){.student-card{width:100%}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏫 KToxGuard – School Dashboard</h1>
        <div class="lang-selector">
            <button data-lang="en" class="active">EN</button><button data-lang="ko">KO</button><button data-lang="fr">FR</button>
            <a href="index.html" style="color:#3B82F6;margin-left:1rem">← Demo</a>
        </div>
    </div>
    <div id="content">Loading...</div>
</div>
<script>
    const students=[{name:"Lee Minho",class:"3-1"},{name:"Kim Yuna",class:"3-2"},{name:"Park Jisoo",class:"2-5"},{name:"Choi Soobin",class:"2-5"},{name:"Kang Daniel",class:"1-3"}];
    const trans={
        en:{bullyingIndicators:"Bullying indicators",studentsMonitored:"Students monitored",schoolThreats:"⚠️ School‑related threats",notify:"Notify counselor",guidanceTitle:"📘 For educators",guidanceText:"Cyberbullying prevention resources – available. Anonymous reporting tool – coming soon.",safe:"✓ Safe",noThreats:"No direct bullying mentions."},
        ko:{bullyingIndicators:"학교 폭력 지표",studentsMonitored:"모니터링 학생",schoolThreats:"⚠️ 학교 관련 위협",notify:"상담사에게 알리기",guidanceTitle:"📘 교육자 가이드",guidanceText:"사이버 폭력 예방 자료 – 제공 예정. 익명 신고 도구 – 준비 중.",safe:"✓ 안전",noThreats:"직접적인 왕따 언급 없음."},
        fr:{bullyingIndicators:"Indicateurs de harcèlement",studentsMonitored:"Élèves suivis",schoolThreats:"⚠️ Menaces scolaires",notify:"Notifier le conseiller",guidanceTitle:"📘 Pour les éducateurs",guidanceText:"Ressources de prévention du cyberharcèlement – disponibles. Outil de signalement anonyme – bientôt.",safe:"✓ Sécurisé",noThreats:"Aucune mention directe de harcèlement."}
    };
    let lang=localStorage.getItem('lang')||'en';
    const API='https://ktoxguard-api-production.up.railway.app';
    function updateLang(){document.querySelectorAll('.lang-selector button').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===lang));localStorage.setItem('lang',lang);load();}
    async function fetchMessages(){return (await fetch(API+'/messages?limit=300')).json()}
    async function load(){try{let messages=await fetchMessages();let bullying=messages.filter(m=>m.label==='toxique'&&(m.text.includes('왕따')||m.text.includes('학폭')||m.text.includes('bully')||m.text.includes('harass')));let t=trans[lang];document.getElementById('content').innerHTML=`
            <div class="stats-grid"><div class="stat-card"><h3>${t.bullyingIndicators}</h3><p>${bullying.length}</p></div></div>
            <h3>${t.studentsMonitored}</h3><div class="students-grid">${students.map(s=>`<div class="student-card" onclick="alert('Student: ${s.name} - ${s.class}\\n${t.guidanceText}')"><h4>${s.name}</h4><p>${s.class}</p><div class="threat-badge threat-low">${t.safe}</div></div>`).join('')}</div>
            <div class="alerts-panel"><h3>${t.schoolThreats}</h3>${bullying.length?bullying.slice(0,3).map(b=>`<div style="padding:0.5rem 0;">${b.text.substring(0,120)}</div>`).join(''):`<p>${t.noThreats}</p>`}<button class="btn" style="margin-top:1rem;" onclick="alert('${t.notify}')">${t.notify}</button></div>
            <div class="guidance-box"><h4>${t.guidanceTitle}</h4><p>${t.guidanceText}</p></div>
        `;}catch(e){document.getElementById('content').innerHTML='<div style="color:red;">Error loading data</div>';}}
    document.querySelectorAll('.lang-selector button').forEach(b=>b.addEventListener('click',()=>{lang=b.getAttribute('data-lang');updateLang();}));
    updateLang();load();setInterval(load,60000);
</script>
</body>
</html>
