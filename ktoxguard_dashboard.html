<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KToxGuard — HYBE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060C1A;
  --surface:#0D1525;
  --surface2:#111D30;
  --border:#1A2740;
  --blue:#3B82F6;
  --cyan:#06B6D4;
  --text:#F1F5F9;
  --muted:#64748B;
  --danger:#EF4444;
  --warn:#F59E0B;
  --ok:#10B981;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--blue);border-radius:4px}

/* HEADER */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.75rem 1.25rem;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  gap:0.75rem;flex-wrap:wrap;
}
.header-left{display:flex;align-items:center;gap:0.75rem}
.logo-kt{height:36px;object-fit:contain}
.divider-v{width:1px;height:28px;background:var(--border)}
.logo-agency{height:28px;object-fit:contain;filter:brightness(0) invert(1);opacity:0.7}
.header-right{display:flex;align-items:center;gap:0.75rem}

/* SECURITY BADGE */
.sec-badge{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:30px;
  font-size:0.75rem;font-weight:600;
  background:rgba(16,185,129,0.12);
  border:1px solid rgba(16,185,129,0.3);
  color:var(--ok);white-space:nowrap;
}
.sec-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* CREAVEN BTN */
.btn-creaven{
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  border:none;color:white;
  padding:6px 14px;border-radius:30px;
  font-size:0.75rem;font-weight:600;cursor:pointer;
  white-space:nowrap;
}

/* LANG */
.lang-wrap{position:relative}
.lang-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:5px 12px;border-radius:30px;
  font-size:0.75rem;font-weight:500;cursor:pointer;
  display:flex;align-items:center;gap:5px;
}
.lang-menu{
  position:absolute;right:0;top:38px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  display:none;flex-direction:column;min-width:130px;z-index:200;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.lang-menu.open{display:flex}
.lang-menu button{
  background:none;border:none;padding:9px 16px;
  text-align:left;color:var(--text);cursor:pointer;
  font-size:0.8rem;
}
.lang-menu button:hover{background:var(--border)}

/* TABS */
.tabs{
  display:flex;gap:4px;padding:0.75rem 1.25rem 0;
  border-bottom:1px solid var(--border);overflow-x:auto;
}
.tab{
  background:none;border:none;
  padding:8px 16px;border-radius:10px 10px 0 0;
  font-size:0.82rem;font-weight:500;color:var(--muted);
  cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;
  transition:all 0.2s;
}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);background:rgba(59,130,246,0.06)}

/* MAIN */
main{padding:1.25rem}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.75rem;margin-bottom:1.5rem}
.stat{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:1rem 1.1rem;
}
.stat label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px}
.stat .val{font-size:1.9rem;font-weight:800;font-family:'Space Grotesk',sans-serif}
.val.blue{color:var(--blue)}
.val.red{color:var(--danger)}
.val.warn{color:var(--warn)}
.val.green{color:var(--ok)}

/* GROUP */
.group-block{margin-bottom:2rem}
.group-header{
  display:flex;align-items:center;gap:0.75rem;
  margin-bottom:1rem;
}
.group-logo{
  width:44px;height:44px;border-radius:12px;
  background:white;padding:6px;object-fit:contain;
}
.group-name{font-size:1.1rem;font-weight:700;font-family:'Space Grotesk',sans-serif}

/* ARTIST GRID */
.artist-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:0.75rem;
}
.artist-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:1rem 0.75rem;
  text-align:center;cursor:pointer;
  transition:all 0.2s;position:relative;
}
.artist-card:hover{border-color:var(--blue);background:var(--surface2);transform:translateY(-2px)}
.artist-photo{
  width:72px;height:72px;border-radius:50%;
  object-fit:cover;object-position:top;
  border:2px solid var(--border);
  margin:0 auto 0.6rem;display:block;
}
.artist-card h4{font-size:0.82rem;font-weight:600;margin-bottom:2px}
.artist-group{font-size:0.68rem;color:var(--muted);margin-bottom:6px}
.threat{
  display:inline-block;padding:3px 10px;
  border-radius:20px;font-size:0.65rem;font-weight:700;
}
.t-low{background:rgba(16,185,129,0.15);color:var(--ok)}
.t-med{background:rgba(245,158,11,0.15);color:var(--warn)}
.t-high{background:rgba(239,68,68,0.15);color:var(--danger)}

/* CHART */
.chart-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:1.25rem;margin-bottom:1.5rem;
}
.chart-title{font-size:0.85rem;font-weight:600;margin-bottom:1rem;color:var(--muted)}

/* MESSAGES */
.messages-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
}
.messages-header{
  padding:1rem 1.25rem;border-bottom:1px solid var(--border);
  font-size:0.9rem;font-weight:600;
}
.msg-item{
  padding:0.9rem 1.25rem;border-bottom:1px solid var(--border);
}
.msg-item:last-child{border-bottom:none}
.msg-meta{
  display:flex;gap:8px;margin-bottom:4px;flex-wrap:wrap;
}
.msg-meta span{font-size:0.68rem;color:var(--muted)}
.msg-text{font-size:0.82rem;line-height:1.5;color:#CBD5E1}
.msg-badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.badge{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:0.65rem;font-weight:600;
}
.badge-toxic{background:rgba(239,68,68,0.15);color:var(--danger)}
.badge-conf{background:rgba(59,130,246,0.12);color:var(--blue)}
.badge-type{background:rgba(6,182,212,0.12);color:var(--cyan)}

/* ARTIST DETAIL */
.artist-detail{display:none}
.back-btn{
  background:none;border:1px solid var(--border);
  color:var(--text);padding:6px 14px;border-radius:30px;
  font-size:0.8rem;cursor:pointer;margin-bottom:1rem;
  display:flex;align-items:center;gap:6px;
}
.detail-hero{
  display:flex;align-items:center;gap:1rem;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:1.25rem;margin-bottom:1.5rem;
}
.detail-photo{
  width:90px;height:90px;border-radius:50%;
  object-fit:cover;object-position:top;
  border:3px solid var(--blue);flex-shrink:0;
}
.detail-info h2{font-size:1.3rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.detail-info .sub{font-size:0.8rem;color:var(--muted);margin-top:2px}

/* EMPTY */
.empty{
  padding:2.5rem;text-align:center;color:var(--muted);font-size:0.85rem;
}

/* GOVT */
.heatmap-placeholder{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:2rem;text-align:center;
  color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem;
}

@media(max-width:480px){
  .header{padding:0.6rem 1rem}
  main{padding:1rem}
  .artist-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:0.6rem}
  .detail-hero{flex-direction:column;text-align:center}
}
</style>
</head>

let lang = localStorage.getItem('ktLang')||'en';
let tab = 'agency';
let stats = null, messages = [], toxChart = null;
let detailArtist = null;

function t(k){return T[lang][k]||k}

function threatForMember(name){
  const n = name.toLowerCase();
  const count = messages.filter(m=>m.label==='toxique'&&m.text.toLowerCase().includes(n)).length;
  if(count===0) return {label:t('calm'),cls:'t-low',val:0};
  if(count<3) return {label:t('vigilance'),cls:'t-med',val:1};
  return {label:t('crisis'),cls:'t-high',val:2};
}

function avatarHtml(member){
  if(member.img&&IMGS[member.img])
    return `<img class="artist-photo" src="${IMGS[member.img]}" alt="${member.name}">`;
  const initials = member.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  return `<div class="artist-photo" style="display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:1.2rem;font-weight:700;color:var(--blue);">${initials}</div>`;
}

async function fetchData(){
  try{
    const [sr,mr] = await Promise.all([
      fetch(API+'/stats').then(r=>r.json()),
      fetch(API+'/messages?limit=100').catch(()=>null)
    ]);
    stats = sr;
    if(mr) messages = await mr.json().catch(()=>[]);
    if(!Array.isArray(messages)) messages = [];
  }catch(e){
    stats = {total_messages:0,toxic_count:0,toxic_percentage:0};
    messages = [];
  }
  render();
}

function render(){
  if(!stats) return;
  updateSecBadge();
  if(tab==='agency') renderAgency();
  else if(tab==='government') renderGovt();
  else renderSchool();
  document.querySelector('.btn-creaven').textContent = t('support');
}

function updateSecBadge(){
  const pct = stats.toxic_percentage||0;
  const badge = document.getElementById('secBadge');
  const label = document.getElementById('secLabel');
  if(pct<10){badge.style.background='rgba(16,185,129,0.12)';badge.style.borderColor='rgba(16,185,129,0.3)';badge.style.color='var(--ok)';document.querySelector('.sec-dot').style.background='var(--ok)';label.textContent=t('secure');}
  else if(pct<30){badge.style.background='rgba(245,158,11,0.12)';badge.style.borderColor='rgba(245,158,11,0.3)';badge.style.color='var(--warn)';document.querySelector('.sec-dot').style.background='var(--warn)';label.textContent=t('moderate');}
  else{badge.style.background='rgba(239,68,68,0.12)';badge.style.borderColor='rgba(239,68,68,0.3)';badge.style.color='var(--danger)';document.querySelector('.sec-dot').style.background='var(--danger)';label.textContent=t('critical');}
}

function renderAgency(){
  // if detail view open, don't overwrite
  if(detailArtist) return;
  const alertCount = GROUPS.flatMap(g=>g.members).filter(m=>threatForMember(m.name).val>0).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><label>${t('total')}</label><div class="val blue">${stats.total_messages}</div></div>
    <div class="stat"><label>${t('toxic')}</label><div class="val red">${stats.toxic_count}</div></div>
    <div class="stat"><label>${t('alerts')}</label><div class="val warn">${alertCount}</div></div>
    <div class="stat"><label>${t('rate')}</label><div class="val green">${(stats.toxic_percentage||0).toFixed(1)}%</div></div>
  `;
  document.getElementById('chartTitle').textContent = t('trend');
  renderChart();
  renderGroups();
  renderMessages('msgsList', messages.filter(m=>m.label==='toxique').slice(0,20), 'msgsHeader', t('recents'));
}

function renderChart(){
  const ctx = document.getElementById('toxChart').getContext('2d');
  if(toxChart) toxChart.destroy();
  const toxic = messages.filter(m=>m.label==='toxique');
  // Group by day (last 7 data points)
  const days = {};
  toxic.forEach(m=>{
    const d = new Date(m.timestamp).toLocaleDateString('en',{month:'short',day:'numeric'});
    days[d]=(days[d]||0)+1;
  });
  const labels = Object.keys(days).slice(-8);
  const data = labels.map(l=>days[l]);
  toxChart = new Chart(ctx,{
    type:'line',
    data:{
      labels:labels.length?labels:['No data'],
      datasets:[{
        data:data.length?data:[0],
        borderColor:'#3B82F6',
        backgroundColor:'rgba(59,130,246,0.08)',
        borderWidth:2,tension:0.4,fill:true,
        pointBackgroundColor:'#3B82F6',pointRadius:3
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748B',font:{size:10}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748B',font:{size:10}}}
      }
    }
  });
}

function renderGroups(){
  let html = '';
  GROUPS.forEach(g=>{
    const logoSrc = IMGS[g.key]||'';
    html += `<div class="group-block">
      <div class="group-header">
        <img class="group-logo" src="${logoSrc}" alt="${g.name}">
        <span class="group-name">${g.name}</span>
      </div>
      <div class="artist-grid">`;
    g.members.forEach(m=>{
      const th = threatForMember(m.name);
      html += `<div class="artist-card" onclick="openDetail('${m.name}','${g.name}','${m.img||''}')">
        ${avatarHtml(m)}
        <h4>${m.name}</h4>
        <div class="artist-group">${g.name}</div>
        <span class="threat ${th.cls}">${th.label}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('groupsContainer').innerHTML = html;
}

function openDetail(name, group, imgKey){
  detailArtist = name;
  document.getElementById('agencyMain').style.display='none';
  document.getElementById('artistDetail').style.display='block';
  document.getElementById('detailPhoto').src = (imgKey&&IMGS[imgKey])||'';
  document.getElementById('detailName').textContent = name;
  document.getElementById('detailGroup').textContent = group;
  const th = threatForMember(name);
  document.getElementById('detailThreat').innerHTML = `<span class="threat ${th.cls}">${th.label}</span>`;
  const mentions = messages.filter(m=>m.label==='toxique'&&m.text.toLowerCase().includes(name.toLowerCase()));
  document.getElementById('detailStats').innerHTML = `
    <div class="stat"><label>Total mentions</label><div class="val red">${mentions.length}</div></div>
    <div class="stat"><label>Threat level</label><div class="val warn">${th.label}</div></div>
  `;
  renderMessages('detailMsgsList', mentions.slice(0,15), 'detailMsgsHeader', t('mentions'));
}

document.getElementById('backBtn').addEventListener('click',()=>{
  detailArtist = null;
  document.getElementById('artistDetail').style.display='none';
  document.getElementById('agencyMain').style.display='block';
});

function renderMessages(containerId, msgs, headerId, title){
  if(headerId) document.getElementById(headerId).textContent = title;
  const el = document.getElementById(containerId);
  if(!msgs.length){el.innerHTML=`<div class="empty">${t('empty')}</div>`;return;}
  el.innerHTML = msgs.map(m=>{
    const types = Array.isArray(m.threat_types)?m.threat_types:[];
    const d = m.timestamp?new Date(m.timestamp).toLocaleDateString(lang==='ko'?'ko-KR':'en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="msg-item">
      <div class="msg-meta">
        <span>👤 ${m.author||'anonymous'}</span>
        <span>📅 ${d}</span>
      </div>
      <div class="msg-text">${(m.text||'').substring(0,200)}</div>
      <div class="msg-badges">
        <span class="badge badge-toxic">${m.label}</span>
        <span class="badge badge-conf">${Math.round((m.confidence||0)*100)}%</span>
        ${types.slice(0,2).map(tp=>`<span class="badge badge-type">${tp}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderGovt(){
  const deaths = messages.filter(m=>m.label==='toxique'&&(m.text.includes('죽어')||m.text.includes('죽여'))).length;
  const doxx = messages.filter(m=>m.label==='toxique'&&m.text.includes('신상')).length;
  document.getElementById('govStats').innerHTML = `
    <div class="stat"><label>${t('national')}</label><div class="val red">${(stats.toxic_percentage||0).toFixed(1)}%</div></div>
    <div class="stat"><label>${t('threats')}</label><div class="val warn">${stats.toxic_count}</div></div>
    <div class="stat"><label>Death threats</label><div class="val red">${deaths}</div></div>
    <div class="stat"><label>Doxxing</label><div class="val warn">${doxx}</div></div>
  `;
  renderMessages('govMsgs', messages.filter(m=>m.label==='toxique').slice(0,30), null, '');
}

function renderSchool(){
  const bullying = messages.filter(m=>m.label==='toxique'&&(m.text.includes('왕따')||m.text.includes('학폭')));
  document.getElementById('schoolStats').innerHTML = `
    <div class="stat"><label>${t('bullyCount')}</label><div class="val warn">${bullying.length}</div></div>
    <div class="stat"><label>${t('students')}</label><div class="val blue">5</div></div>
  `;
  renderMessages('schoolMsgs', bullying.slice(0,20), null, '');
}

// LANG
document.getElementById('langBtn').addEventListener('click',()=>{
  document.getElementById('langMenu').classList.toggle('open');
});
document.querySelectorAll('#langMenu button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    lang = btn.dataset.lang;
    localStorage.setItem('ktLang',lang);
    document.getElementById('langLabel').textContent = lang.toUpperCase();
    document.getElementById('langMenu').classList.remove('open');
    render();
  });
});
document.addEventListener('click',e=>{
  if(!document.getElementById('langWrap').contains(e.target))
    document.getElementById('langMenu').classList.remove('open');
});
document.getElementById('langLabel').textContent = lang.toUpperCase();

// TABS
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    tab = t.dataset.tab;
    ['agency','government','school'].forEach(v=>{
      document.getElementById('view-'+v).style.display = v===tab?'block':'none';
    });
    render();
  });
});

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
