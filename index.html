<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KToxGuard — HYBE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070B14;
  --surface:#0D1320;
  --surface2:#121A2B;
  --border:#1C2740;
  --blue:#3B82F6;
  --cyan:#22D3EE;
  --text:#F1F5F9;
  --muted:#64748B;
  --danger:#F43F5E;
  --warn:#F59E0B;
  --ok:#10B981;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--blue);border-radius:10px}

/* HEADER */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.9rem 1.5rem;background:rgba(13,19,32,0.85);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;gap:0.75rem;flex-wrap:wrap;
}
.header-left{display:flex;align-items:center;gap:1rem}
.logo-kt{height:32px;object-fit:contain;display:block}
.header-right{display:flex;align-items:center;gap:0.6rem}

.sec-badge{
  display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:30px;
  font-size:0.72rem;font-weight:600;background:rgba(16,185,129,0.1);
  border:1px solid rgba(16,185,129,0.25);color:var(--ok);white-space:nowrap;
  transition:all 0.3s;
}
.sec-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.btn-creaven{
  background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;color:#06101F;
  padding:7px 16px;border-radius:30px;font-size:0.72rem;font-weight:700;cursor:pointer;
  white-space:nowrap;box-shadow:0 4px 14px rgba(59,130,246,0.25);
}

.lang-wrap{position:relative}
.lang-btn{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:6px 14px;border-radius:30px;font-size:0.72rem;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:5px;
}
.lang-menu{
  position:absolute;right:0;top:42px;background:var(--surface2);
  border:1px solid var(--border);border-radius:14px;overflow:hidden;
  display:none;flex-direction:column;min-width:140px;z-index:200;
  box-shadow:0 12px 30px rgba(0,0,0,0.5);
}
.lang-menu.open{display:flex}
.lang-menu button{background:none;border:none;padding:10px 16px;text-align:left;color:var(--text);cursor:pointer;font-size:0.8rem}
.lang-menu button:hover{background:var(--border)}

/* TABS */
.tabs{display:flex;gap:4px;padding:0.9rem 1.5rem 0;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{
  background:none;border:none;padding:9px 18px;border-radius:10px 10px 0 0;
  font-size:0.82rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all 0.2s;
}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);background:rgba(59,130,246,0.07)}

main{padding:1.5rem;max-width:1400px;margin:0 auto}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.85rem;margin-bottom:1.75rem}
.stat{
  background:linear-gradient(150deg,var(--surface) 0%,var(--surface2) 100%);
  border:1px solid var(--border);border-radius:18px;padding:1.1rem 1.25rem;
  position:relative;overflow:hidden;
}
.stat::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--blue);opacity:0.6}
.stat label{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:5px;font-weight:600}
.stat .val{font-size:2rem;font-weight:800;font-family:'Space Grotesk',sans-serif;line-height:1}
.val.blue{color:var(--blue)}.val.red{color:var(--danger)}.val.warn{color:var(--warn)}.val.green{color:var(--ok)}

/* CHART */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.4rem;margin-bottom:1.75rem}
.chart-title{font-size:0.85rem;font-weight:600;margin-bottom:1rem;color:var(--muted)}

/* GROUP */
.group-block{margin-bottom:2.25rem}
.group-header{display:flex;align-items:center;gap:0.85rem;margin-bottom:1.1rem}
.group-badge{
  width:42px;height:42px;border-radius:12px;background:var(--surface2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.85rem;color:var(--blue);
  flex-shrink:0;
}
.group-name{font-size:1.15rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.group-count{font-size:0.72rem;color:var(--muted);margin-left:auto}

/* ARTIST GRID */
.artist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:0.85rem}
.artist-card{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:1.1rem 0.8rem;text-align:center;cursor:pointer;transition:all 0.25s;position:relative;
}
.artist-card:hover{border-color:var(--blue);background:var(--surface2);transform:translateY(-3px);box-shadow:0 10px 25px rgba(59,130,246,0.12)}
.artist-photo{
  width:74px;height:74px;border-radius:50%;object-fit:cover;object-position:top;
  border:2px solid var(--border);margin:0 auto 0.7rem;display:block;background:var(--surface2);
}
.artist-photo.fallback{
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.3rem;color:var(--blue);
  background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(34,211,238,0.1));
}
.artist-card h4{font-size:0.84rem;font-weight:600;margin-bottom:2px}
.artist-group{font-size:0.66rem;color:var(--muted);margin-bottom:7px}
.threat{display:inline-block;padding:3px 11px;border-radius:20px;font-size:0.64rem;font-weight:700}
.t-low{background:rgba(16,185,129,0.13);color:var(--ok)}
.t-med{background:rgba(245,158,11,0.13);color:var(--warn)}
.t-high{background:rgba(244,63,94,0.13);color:var(--danger)}

/* MESSAGES */
.messages-wrap{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.messages-header{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);font-size:0.9rem;font-weight:600;display:flex;align-items:center;gap:8px}
.msg-item{padding:1rem 1.4rem;border-bottom:1px solid var(--border)}
.msg-item:last-child{border-bottom:none}
.msg-meta{display:flex;gap:10px;margin-bottom:5px;flex-wrap:wrap;align-items:center}
.msg-meta span{font-size:0.68rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.platform-tag{
  font-size:0.65rem;font-weight:700;padding:2px 9px;border-radius:6px;
  background:var(--surface2);color:var(--cyan);text-transform:uppercase;letter-spacing:0.3px;
}
.msg-text{font-size:0.83rem;line-height:1.55;color:#CBD5E1}
.msg-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.64rem;font-weight:600}
.badge-toxic{background:rgba(244,63,94,0.13);color:var(--danger)}
.badge-conf{background:rgba(59,130,246,0.1);color:var(--blue)}
.badge-type{background:rgba(34,211,238,0.1);color:var(--cyan)}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(5,8,15,0.88);backdrop-filter:blur(8px);
  display:none;align-items:flex-end;justify-content:center;z-index:1000;
}
.modal-overlay.active{display:flex}
.modal-content{
  background:var(--surface);border-radius:28px 28px 0 0;padding:1.75rem 1.5rem 2.5rem;
  max-width:560px;width:100%;max-height:88vh;overflow-y:auto;
  border:1px solid var(--border);box-shadow:0 -10px 50px rgba(0,0,0,0.5);
  animation:slideUp 0.3s ease;
}
@media(min-width:640px){
  .modal-overlay{align-items:center}
  .modal-content{border-radius:28px;max-height:80vh}
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{
  background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  width:32px;height:32px;border-radius:50%;cursor:pointer;float:right;
  font-size:1rem;display:flex;align-items:center;justify-content:center;
}
.modal-hero{display:flex;align-items:center;gap:1rem;margin-top:0.5rem;margin-bottom:1.25rem}
.modal-photo{width:84px;height:84px;border-radius:50%;object-fit:cover;object-position:top;border:3px solid var(--blue);flex-shrink:0}
.modal-photo.fallback{display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.6rem;color:var(--blue);background:linear-gradient(135deg,rgba(59,130,246,0.18),rgba(34,211,238,0.12))}
.modal-info h2{font-size:1.3rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
.modal-info .sub{font-size:0.8rem;color:var(--muted);margin-top:2px}

.empty{padding:2.5rem;text-align:center;color:var(--muted);font-size:0.85rem}
.heatmap-placeholder{background:var(--surface);border:1px dashed var(--border);border-radius:18px;padding:2.2rem;text-align:center;color:var(--muted);font-size:0.85rem;margin-bottom:1.75rem}

@media(max-width:480px){
  .header{padding:0.7rem 1rem}
  main{padding:1rem}
  .artist-grid{grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:0.6rem}
  .artist-photo{width:62px;height:62px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <img class="logo-kt" src="images/logos/ktoxguard.png" alt="KToxGuard" onerror="this.style.display='none'">
  </div>
  <div class="header-right">
    <div class="sec-badge" id="secBadge">
      <span class="sec-dot"></span>
      <span id="secLabel">Secure</span>
    </div>
    <div class="lang-wrap" id="langWrap">
      <button class="lang-btn" id="langBtn">🌐 <span id="langLabel">EN</span> ▾</button>
      <div class="lang-menu" id="langMenu">
        <button data-lang="en">🇬🇧 English</button>
        <button data-lang="ko">🇰🇷 한국어</button>
        <button data-lang="fr">🇫🇷 Français</button>
      </div>
    </div>
    <button class="btn-creaven" id="creavenBtn" onclick="window.open('https://creaven.pages.dev','_blank')">Need support?</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="agency">🎵 Agency</button>
  <button class="tab" data-tab="government">🏛️ Government</button>
  <button class="tab" data-tab="school">🏫 School</button>
</div>

<main>
  <div class="stats-row" id="statsRow"></div>
  <div class="chart-wrap" id="chartWrap">
    <div class="chart-title" id="chartTitle">Toxicity trend</div>
    <canvas id="toxChart" height="110"></canvas>
  </div>
  <div id="heatmapSlot"></div>
  <div id="groupsContainer"></div>
  <div class="messages-wrap" style="margin-top:1.75rem">
    <div class="messages-header" id="msgsHeader">📩 Recent detections</div>
    <div id="msgsList"><div class="empty">Loading…</div></div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const API = 'https://ktoxguard-api-production.up.railway.app';

const GROUPS = [
  {name:'BTS',members:[
    {name:'Jimin',img:'images/artists/jimin.jpg'},
    {name:'RM',img:'images/artists/rm.jpg'},
    {name:'V',img:'images/artists/v.jpg'},
    {name:'Jungkook',img:'images/artists/jungkook.jpg'},
    {name:'Suga',img:'images/artists/suga.jpeg'},
    {name:'Jin',img:'images/artists/jin.jpg'},
    {name:'J-Hope',img:'images/artists/jhope.jpg'}
  ]},
  {name:'SEVENTEEN',members:[
    {name:'S.Coups',img:'images/artists/scoups.jpeg'},
    {name:'Dino',img:'images/artists/dino.jpg'},
    {name:'Hoshi',img:'images/artists/hoshi.jpg'},
    {name:'DK',img:'images/artists/dk.jpg'},
    {name:'Mingyu',img:'images/artists/mingyu.jpg'},
    {name:'Jeonghan',img:'images/artists/jeonghan.jpg'},
    {name:'Wonwoo',img:'images/artists/wonwoo.jpg'},
    {name:'Jun',img:'images/artists/jun.jpg'},
    {name:'Minghao',img:'images/artists/minghao.jpg'},
    {name:'Woozi',img:'images/artists/woozi.jpg'},
    {name:'Vernon',img:'images/artists/vernon.jpg'},
    {name:'Joshua',img:'images/artists/joshua.jpg'},
    {name:'Seungkwan',img:'images/artists/seungkwan.jpg'}
  ]},
  {name:'TXT',members:[
    {name:'Yeonjun',img:'images/artists/yeonjun.jpg'},
    {name:'Soobin',img:'images/artists/soobin.jpg'},
    {name:'Beomgyu',img:'images/artists/beomgyu.jpg'},
    {name:'Huening Kai',img:'images/artists/kai.jpeg'},
    {name:'Taehyun',img:'images/artists/taehyun.jpeg'}
  ]},
  {name:'NewJeans',members:[
    {name:'Minji',img:'images/artists/minji.jpg'},
    {name:'Hanni',img:'images/artists/hanni.jpg'},
    {name:'Danielle',img:'images/artists/danielle.jpg'},
    {name:'Haerin',img:'images/artists/haerin.jpg'},
    {name:'Hyein',img:'images/artists/hyein.jpg'}
  ]}
];

const T = {
  en:{secure:'Secure',moderate:'Moderate',critical:'Critical',
    total:'Total messages',toxic:'Toxic messages',alerts:'Artists under alert',rate:'Toxicity rate',
    trend:'Toxicity trend — last detections',recents:'Recent detections',
    calm:'Calm',vigilance:'Vigilance',crisis:'Crisis',
    mentions:'Messages mentioning this artist',empty:'No messages yet.',support:'Need support?',
    bullyCount:'Bullying indicators',students:'Students monitored',
    national:'National toxicity rate',threats:'Total threats',deaths:'Death threats',doxx:'Doxxing',hate:'Hate speech',
    heatmap:'🗺️ Geographic heatmap — coming soon'},
  ko:{secure:'안전',moderate:'주의',critical:'위험',
    total:'전체 메시지',toxic:'유해 메시지',alerts:'경고 아티스트',rate:'유해율',
    trend:'독성 추이',recents:'최근 탐지',
    calm:'안정',vigilance:'주의',crisis:'위험',
    mentions:'관련 메시지',empty:'메시지 없음.',support:'도움이 필요하신가요?',
    bullyCount:'학폭 지표',students:'모니터링 학생',
    national:'국가 유해율',threats:'전체 위협',deaths:'살해 위협',doxx:'신상유출',hate:'혐오 발언',
    heatmap:'🗺️ 지리적 히트맵 — 준비 중'},
  fr:{secure:'Sécurisé',moderate:'Vigilance',critical:'Critique',
    total:'Messages totaux',toxic:'Messages toxiques',alerts:'Artistes sous alerte',rate:'Taux de toxicité',
    trend:'Tendance de toxicité',recents:'Détections récentes',
    calm:'Calme',vigilance:'Vigilance',crisis:'Critique',
    mentions:'Messages mentionnant cet artiste',empty:'Aucun message.',support:"Besoin d'aide?",
    bullyCount:'Indicateurs harcèlement',students:'Élèves suivis',
    national:'Taux national de toxicité',threats:'Menaces totales',deaths:'Menaces de mort',doxx:'Doxxing',hate:'Discours haineux',
    heatmap:'🗺️ Carte de chaleur géographique — à venir'}
};

let lang = localStorage.getItem('ktLang')||'en';
let tab = 'agency';
let stats = null, messages = [], chart = null;

function t(k){return T[lang][k]||k}
function initials(name){return name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}

function avatarHtml(name, img, size){
  return `<img class="${size}" src="${img}" alt="${name}"
    onerror="this.outerHTML='<div class=&quot;${size} fallback&quot;>${initials(name)}</div>'">`;
}

function threatFor(name){
  const n = name.toLowerCase();
  const count = messages.filter(m=>m.label==='toxique'&&(m.text||'').toLowerCase().includes(n)).length;
  if(count===0) return {label:t('calm'),cls:'t-low',val:0};
  if(count<3) return {label:t('vigilance'),cls:'t-med',val:1};
  return {label:t('crisis'),cls:'t-high',val:2};
}

async function fetchData(){
  try{
    const sr = await fetch(API+'/stats').then(r=>r.json());
    stats = sr;
    let mr = [];
    try{ mr = await fetch(API+'/messages?limit=100').then(r=>r.json()); }catch(e){}
    messages = Array.isArray(mr) ? mr : [];
  }catch(e){
    stats = {total_messages:0,toxic_count:0,toxic_percentage:0};
    messages = [];
  }
  render();
}

function render(){
  if(!stats) return;
  updateSecBadge();
  document.getElementById('creavenBtn').textContent = t('support');
  document.getElementById('msgsHeader').textContent = '📩 ' + t('recents');
  if(tab==='agency') renderAgency();
  else if(tab==='government') renderGovt();
  else renderSchool();
}

function updateSecBadge(){
  const pct = stats.toxic_percentage||0;
  const badge = document.getElementById('secBadge');
  const label = document.getElementById('secLabel');
  const dot = badge.querySelector('.sec-dot');
  let color, bg, border, key;
  if(pct<10){color='var(--ok)';bg='rgba(16,185,129,0.1)';border='rgba(16,185,129,0.25)';key='secure';}
  else if(pct<30){color='var(--warn)';bg='rgba(245,158,11,0.1)';border='rgba(245,158,11,0.25)';key='moderate';}
  else{color='var(--danger)';bg='rgba(244,63,94,0.1)';border='rgba(244,63,94,0.25)';key='critical';}
  badge.style.background=bg;badge.style.borderColor=border;badge.style.color=color;
  dot.style.background=color;label.textContent=t(key);
}

function renderAgency(){
  document.getElementById('chartWrap').style.display='block';
  document.getElementById('heatmapSlot').innerHTML='';
  const alertCount = GROUPS.flatMap(g=>g.members).filter(m=>threatFor(m.name).val>0).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><label>${t('total')}</label><div class="val blue">${stats.total_messages}</div></div>
    <div class="stat"><label>${t('toxic')}</label><div class="val red">${stats.toxic_count}</div></div>
    <div class="stat"><label>${t('alerts')}</label><div class="val warn">${alertCount}</div></div>
    <div class="stat"><label>${t('rate')}</label><div class="val green">${(stats.toxic_percentage||0).toFixed(1)}%</div></div>
  `;
  document.getElementById('chartTitle').textContent = t('trend');
  renderChart();
  renderGroups();
  renderMessages(messages.filter(m=>m.label==='toxique').slice(0,20));
}

function renderChart(){
  const ctx = document.getElementById('toxChart').getContext('2d');
  if(chart) chart.destroy();
  const toxic = messages.filter(m=>m.label==='toxique');
  const days = {};
  toxic.forEach(m=>{
    const d = m.timestamp ? new Date(m.timestamp).toLocaleDateString('en',{month:'short',day:'numeric'}) : 'N/A';
    days[d]=(days[d]||0)+1;
  });
  let labels = Object.keys(days);
  let data = labels.map(l=>days[l]);
  if(!labels.length){labels=['No data'];data=[0];}
  labels = labels.slice(-10); data = data.slice(-10);
  chart = new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{
      data,borderColor:'#3B82F6',backgroundColor:'rgba(59,130,246,0.08)',
      borderWidth:2,tension:0.4,fill:true,pointBackgroundColor:'#3B82F6',pointRadius:3
    }]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748B',font:{size:10}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748B',font:{size:10}}}
      }
    }
  });
}

function renderGroups(){
  let html = '';
  GROUPS.forEach(g=>{
    html += `<div class="group-block">
      <div class="group-header">
        <div class="group-badge">${initials(g.name)}</div>
        <span class="group-name">${g.name}</span>
        <span class="group-count">${g.members.length} members</span>
      </div>
      <div class="artist-grid">`;
    g.members.forEach(m=>{
      const th = threatFor(m.name);
      html += `<div class="artist-card" onclick='openDetail(${JSON.stringify(m.name)},${JSON.stringify(g.name)},${JSON.stringify(m.img)})'>
        ${avatarHtml(m.name, m.img, 'artist-photo')}
        <h4>${m.name}</h4>
        <div class="artist-group">${g.name}</div>
        <span class="threat ${th.cls}">${th.label}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('groupsContainer').innerHTML = html;
}

function openDetail(name, group, img){
  const mentions = messages.filter(m=>m.label==='toxique'&&(m.text||'').toLowerCase().includes(name.toLowerCase()));
  const th = threatFor(name);
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-hero">
      ${avatarHtml(name, img, 'modal-photo')}
      <div class="modal-info">
        <h2>${name}</h2>
        <div class="sub">${group}</div>
        <span class="threat ${th.cls}" style="margin-top:6px;display:inline-block">${th.label}</span>
      </div>
    </div>
    <div class="stats-row" style="margin-bottom:1rem">
      <div class="stat"><label>Mentions</label><div class="val red">${mentions.length}</div></div>
      <div class="stat"><label>${t('rate')}</label><div class="val warn">${th.label}</div></div>
    </div>
    <div class="messages-wrap">
      <div class="messages-header">${t('mentions')}</div>
      <div>${mentions.length ? mentions.slice(0,15).map(msgRow).join('') : '<div class="empty">'+t('empty')+'</div>'}</div>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

document.getElementById('modalClose').addEventListener('click',()=>{
  document.getElementById('modalOverlay').classList.remove('active');
});
document.getElementById('modalOverlay').addEventListener('click',e=>{
  if(e.target===e.currentTarget) document.getElementById('modalOverlay').classList.remove('active');
});

function msgRow(m){
  const types = Array.isArray(m.threat_types)?m.threat_types:[];
  const d = m.timestamp ? new Date(m.timestamp).toLocaleDateString(lang==='ko'?'ko-KR':'en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  const platform = m.platform || 'web';
  return `<div class="msg-item">
    <div class="msg-meta">
      <span class="platform-tag">${platform}</span>
      <span>📅 ${d}</span>
    </div>
    <div class="msg-text">${(m.text||'').substring(0,200)}</div>
    <div class="msg-badges">
      <span class="badge badge-toxic">${m.label}</span>
      <span class="badge badge-conf">${Math.round((m.confidence||0)*100)}%</span>
      ${types.slice(0,2).map(tp=>`<span class="badge badge-type">${tp}</span>`).join('')}
    </div>
  </div>`;
}

function renderMessages(msgs){
  const el = document.getElementById('msgsList');
  el.innerHTML = msgs.length ? msgs.map(msgRow).join('') : `<div class="empty">${t('empty')}</div>`;
}

function renderGovt(){
  document.getElementById('chartWrap').style.display='none';
  document.getElementById('heatmapSlot').innerHTML = `<div class="heatmap-placeholder">${t('heatmap')}</div>`;
  document.getElementById('groupsContainer').innerHTML = '';
  const deaths = messages.filter(m=>m.label==='toxique'&&((m.text||'').includes('죽어')||(m.text||'').includes('죽여'))).length;
  const doxx = messages.filter(m=>m.label==='toxique'&&(m.text||'').includes('신상')).length;
  const hate = messages.filter(m=>m.label==='toxique'&&(m.text||'').includes('병신')).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><label>${t('national')}</label><div class="val red">${(stats.toxic_percentage||0).toFixed(1)}%</div></div>
    <div class="stat"><label>${t('threats')}</label><div class="val warn">${stats.toxic_count}</div></div>
    <div class="stat"><label>${t('deaths')}</label><div class="val red">${deaths}</div></div>
    <div class="stat"><label>${t('doxx')}</label><div class="val warn">${doxx}</div></div>
  `;
  renderMessages(messages.filter(m=>m.label==='toxique').slice(0,30));
}

function renderSchool(){
  document.getElementById('chartWrap').style.display='none';
  document.getElementById('heatmapSlot').innerHTML='';
  document.getElementById('groupsContainer').innerHTML = '';
  const bullying = messages.filter(m=>m.label==='toxique'&&((m.text||'').includes('왕따')||(m.text||'').includes('학폭')));
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><label>${t('bullyCount')}</label><div class="val warn">${bullying.length}</div></div>
    <div class="stat"><label>${t('students')}</label><div class="val blue">5</div></div>
  `;
  renderMessages(bullying.slice(0,20));
}

document.getElementById('langBtn').addEventListener('click',()=>{
  document.getElementById('langMenu').classList.toggle('open');
});
document.querySelectorAll('#langMenu button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    lang = btn.dataset.lang;
    localStorage.setItem('ktLang',lang);
    document.getElementById('langLabel').textContent = lang.toUpperCase();
    document.getElementById('langMenu').classList.remove('open');
    render();
  });
});
document.addEventListener('click',e=>{
  if(!document.getElementById('langWrap').contains(e.target))
    document.getElementById('langMenu').classList.remove('open');
});
document.getElementById('langLabel').textContent = lang.toUpperCase();

document.querySelectorAll('.tab').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    tab = el.dataset.tab;
    render();
  });
});

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
