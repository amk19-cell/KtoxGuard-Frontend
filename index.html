<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KToxGuard – Anti‑Violence Social Listening</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0A0F1E; color: #F9FAFB; font-family: 'Inter', sans-serif; line-height: 1.5; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3B82F6; border-radius: 10px; }

        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
            background: #111827; padding: 0.75rem 1.5rem; border-radius: 60px; margin-bottom: 2rem;
            border: 1px solid #1E293B;
        }
        .logo-area { display: flex; align-items: center; gap: 1.2rem; }
        .logo-area svg { height: 42px; width: auto; }
        .lang-dropdown { position: relative; }
        .lang-btn { background: #1F2937; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; color: white; font-weight: 500; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .lang-menu { position: absolute; right: 0; top: 45px; background: #1F2937; border-radius: 20px; padding: 0.5rem 0; width: 130px; display: none; flex-direction: column; z-index: 20; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .lang-menu button { background: none; border: none; padding: 0.6rem 1rem; text-align: left; color: #F9FAFB; cursor: pointer; }
        .lang-menu button:hover { background: #3B82F6; border-radius: 8px; }
        .lang-dropdown.active .lang-menu { display: flex; }

        .tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; border-bottom: 1px solid #1F2937; padding-bottom: 0.5rem; }
        .tab { background: none; border: none; padding: 0.6rem 1.5rem; font-size: 1rem; font-weight: 600; color: #9CA3AF; cursor: pointer; border-radius: 40px; transition: 0.2s; }
        .tab.active { background: #3B82F6; color: white; }

        .stats-grid { display: flex; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 2.5rem; }
        .stat-card { background: linear-gradient(135deg, #111827 0%, #0F172A 100%); border-radius: 28px; padding: 1.2rem 1.8rem; flex: 1; min-width: 180px; border: 1px solid #1E293B; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .stat-card h4 { font-size: 0.85rem; color: #9CA3AF; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 2.4rem; font-weight: 800; }

        .section-title { font-size: 1.3rem; font-weight: 600; margin: 2rem 0 1rem 0; display: flex; align-items: center; gap: 10px; }

        .group-block { margin-bottom: 2.5rem; background: #0F172A; border-radius: 32px; padding: 1.2rem; border: 1px solid #1E293B; }
        .group-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.2rem; border-bottom: 2px solid #1E293B; padding-bottom: 0.5rem; }
        .group-header img { width: 60px; height: 60px; object-fit: contain; background: #111827; border-radius: 20px; padding: 8px; }
        .group-header h2 { font-size: 1.8rem; font-weight: 700; }

        .artist-grid { display: flex; flex-wrap: wrap; gap: 1.2rem; }
        .artist-card {
            background: #111827; border-radius: 24px; padding: 1rem; width: 160px; text-align: center;
            transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #1E293B; cursor: pointer;
        }
        .artist-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(59,130,246,0.15); background: #1F2937; }
        .artist-card img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 0.75rem; border: 3px solid #3B82F6; padding: 2px; background: #0A0F1E; }
        .artist-card h4 { font-size: 1rem; font-weight: 600; }
        .artist-card .group-name { font-size: 0.7rem; color: #9CA3AF; margin-top: 4px; }
        .threat-badge { display: inline-block; margin-top: 8px; padding: 4px 14px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; }
        .threat-low { background: #10B981; color: #fff; }
        .threat-medium { background: #F59E0B; color: #000; }
        .threat-high { background: #EF4444; color: #fff; }

        .messages-panel { background: #111827; border-radius: 28px; padding: 1.5rem; margin-top: 1.5rem; border: 1px solid #1E293B; }
        .message-item { border-bottom: 1px solid #1F2937; padding: 1rem 0; }
        .message-item:last-child { border: none; }
        .message-meta { display: flex; gap: 12px; font-size: 0.75rem; color: #9CA3AF; margin-bottom: 0.25rem; }
        .message-text { font-size: 0.9rem; color: #E2E8F0; }
        .toxique-badge { background: #EF4444; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin-top: 6px; font-weight: 600; }

        .soon-card { background: #1F2937; border-radius: 28px; padding: 2rem; text-align: center; color: #9CA3AF; margin-top: 2rem; border: 1px dashed #1E293B; }
        canvas { max-height: 300px; background: #0A0F1E; border-radius: 20px; padding: 1rem; }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .top-bar { border-radius: 30px; padding: 0.5rem 1rem; }
            .logo-area svg { height: 32px; }
            .group-header h2 { font-size: 1.3rem; }
            .stat-card .value { font-size: 1.8rem; }
            .artist-card { width: 140px; }
            .artist-card img { width: 70px; height: 70px; }
        }
        @media (max-width: 480px) {
            .artist-card { width: 100%; }
            .tab { font-size: 0.85rem; padding: 0.4rem 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo-area">
            <svg viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="28" font-family="'Inter', sans-serif" font-weight="700" font-size="24" fill="#3B82F6">KTox</text>
                <text x="72" y="28" font-family="'Inter', sans-serif" font-weight="700" font-size="24" fill="#F9FAFB">Guard</text>
                <rect x="0" y="32" width="200" height="2" fill="#3B82F6" opacity="0.4"/>
            </svg>
        </div>
        <div class="lang-dropdown" id="langDropdown">
            <button class="lang-btn" id="langBtn"><i class="fas fa-globe"></i> <span id="currentLangLabel">EN</span> <i class="fas fa-chevron-down"></i></button>
            <div class="lang-menu" id="langMenu">
                <button data-lang="en">🇬🇧 English</button>
                <button data-lang="ko">🇰🇷 한국어</button>
                <button data-lang="fr">🇫🇷 Français</button>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" data-tab="agency">🎵 Agency Admin</button>
        <button class="tab" data-tab="government">🏛️ Government</button>
        <button class="tab" data-tab="school">🏫 School</button>
    </div>

    <div id="dashboardContent">
        <div id="statsGrid" class="stats-grid"></div>
        <div class="section-title"><i class="fas fa-microphone-alt"></i> <span id="artistsTitle">Artists monitored</span></div>
        <div id="artistsGrid"></div>
        <div id="extraSection"></div>
        <div class="messages-panel">
            <h3 id="recentMessagesTitle">📩 Recent toxic messages</h3>
            <div id="messagesList">Loading messages...</div>
        </div>
    </div>
</div>

<script>
    // ---------- GROUPS WITH EXTERNAL LOGOS ----------
    const groups = [
        {
            name: "BTS",
            logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/BTS_logo_2017.png/200px-BTS_logo_2017.png",
            members: ["Jimin", "RM", "V", "Jungkook", "Suga", "Jin", "J-Hope"]
        },
        {
            name: "BLACKPINK",
            logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Blackpink_logo.png/200px-Blackpink_logo.png",
            members: ["Jisoo", "Jennie", "Rosé", "Lisa"]
        },
        {
            name: "IVE",
            logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/IVE_logo.png/200px-IVE_logo.png",
            members: ["Yujin", "Gaeul", "Rei", "Wonyoung", "Liz", "Leeseo"]
        },
        {
            name: "NMIXX",
            logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/NMIXX_logo.png/200px-NMIXX_logo.png",
            members: ["Lily", "Haewon", "Sullyoon", "Bae", "Jiwoo", "Kyujin"]
        },
        {
            name: "KATSEYE",
            logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Katseye_logo.png/200px-Katseye_logo.png",
            members: ["Sophia", "Lara", "Yoonchae", "Megan", "Daniela", "Manon"]
        }
    ];

    // Photos des membres (Wikimedia Commons)
    const memberPhotos = {
        // BTS
        "Jimin": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Jimin_%28BTS%29%2C_May_2025_%28cropped%29.jpg/200px-Jimin_%28BTS%29%2C_May_2025_%28cropped%29.jpg",
        "RM": "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/RM_at_the_White_House_%28cropped%29.jpg/200px-RM_at_the_White_House_%28cropped%29.jpg",
        "V": "https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/V_at_the_White_House_%28cropped%29.jpg/200px-V_at_the_White_House_%28cropped%29.jpg",
        "Jungkook": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Jungkook_at_the_White_House_%28cropped%29.jpg/200px-Jungkook_at_the_White_House_%28cropped%29.jpg",
        "Suga": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Suga_at_the_White_House_%28cropped%29.jpg/200px-Suga_at_the_White_House_%28cropped%29.jpg",
        "Jin": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Jin_at_the_White_House_%28cropped%29.jpg/200px-Jin_at_the_White_House_%28cropped%29.jpg",
        "J-Hope": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/J-Hope_at_the_White_House_%28cropped%29.jpg/200px-J-Hope_at_the_White_House_%28cropped%29.jpg",
        // BLACKPINK
        "Jisoo": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Jisoo_%28Blackpink%29_2020.png/200px-Jisoo_%28Blackpink%29_2020.png",
        "Jennie": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Jennie_%28Blackpink%29_2020.png/200px-Jennie_%28Blackpink%29_2020.png",
        "Rosé": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Rosé_%28Blackpink%29_2020.png/200px-Rosé_%28Blackpink%29_2020.png",
        "Lisa": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Lisa_%28Blackpink%29_2020.png/200px-Lisa_%28Blackpink%29_2020.png",
        // IVE
        "Yujin": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Yujin_IVE_2023.jpg/200px-Yujin_IVE_2023.jpg",
        "Gaeul": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Gaeul_IVE_2023.jpg/200px-Gaeul_IVE_2023.jpg",
        "Rei": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Rei_IVE_2023.jpg/200px-Rei_IVE_2023.jpg",
        "Wonyoung": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Wonyoung_IVE_2023.jpg/200px-Wonyoung_IVE_2023.jpg",
        "Liz": "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Liz_IVE_2023.jpg/200px-Liz_IVE_2023.jpg",
        "Leeseo": "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Leeseo_IVE_2023.jpg/200px-Leeseo_IVE_2023.jpg",
        // NMIXX
        "Lily": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Lily_NMIXX_2022.jpg/200px-Lily_NMIXX_2022.jpg",
        "Haewon": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Haewon_NMIXX_2022.jpg/200px-Haewon_NMIXX_2022.jpg",
        "Sullyoon": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Sullyoon_NMIXX_2022.jpg/200px-Sullyoon_NMIXX_2022.jpg",
        "Bae": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Bae_NMIXX_2022.jpg/200px-Bae_NMIXX_2022.jpg",
        "Jiwoo": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Jiwoo_NMIXX_2022.jpg/200px-Jiwoo_NMIXX_2022.jpg",
        "Kyujin": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/92/Kyujin_NMIXX_2022.jpg/200px-Kyujin_NMIXX_2022.jpg",
        // KATSEYE (placeholder – remplacez par les vraies photos)
        "Sophia": "https://via.placeholder.com/90/3B82F6/FFFFFF?text=S",
        "Lara": "https://via.placeholder.com/90/3B82F6/FFFFFF?text=L",
        "Yoonchae": "https://via.placeholder.com/90/3B82F6/FFFFFF?text=Y",
        "Megan": "https://via.placeholder.com/90/3B82F6/FFFFFF?text=M",
        "Daniela": "https://via.placeholder.com/90/3B82F6/FFFFFF?text=D",
        "Manon": "https://via.placeholder.com/90/3B82F6/FFFFFF?text=M"
    };

    function getMemberPhoto(name) {
        return memberPhotos[name] || `https://via.placeholder.com/90/3B82F6/FFFFFF?text=${name.charAt(0)}`;
    }

    // ---------- i18n ----------
    const translations = {
        en: {
            artistsTitle: "Artists monitored",
            totalMessages: "Total messages",
            toxicMessages: "Toxic messages",
            artistsAlert: "Artists under alert",
            nationalToxicity: "National toxicity rate",
            totalThreats: "Total threats",
            bullyingIndicators: "Bullying indicators",
            studentsMonitored: "Students monitored",
            criticalAlerts: "⚠️ Critical alerts",
            escalate: "Notify counselor",
            guidance: "Guidance: In case of death threat, export evidence and contact police (112).",
            schoolGuidance: "Cyberbullying prevention resources. Anonymous reporting coming soon.",
            recentMessages: "📩 Recent toxic messages",
            noMessages: "No toxic messages yet.",
            threatLevel: "Threat level"
        },
        ko: {
            artistsTitle: "모니터링 아티스트",
            totalMessages: "전체 메시지",
            toxicMessages: "유해 메시지",
            artistsAlert: "경고 아티스트",
            nationalToxicity: "국가 유해율",
            totalThreats: "전체 위협",
            bullyingIndicators: "학교 폭력 지표",
            studentsMonitored: "모니터링 학생",
            criticalAlerts: "⚠️ 긴급 알림",
            escalate: "상담사에게 알리기",
            guidance: "가이드: 살해 위협 시 증거 저장 후 경찰(112)에 신고하세요.",
            schoolGuidance: "사이버 폭력 예방 자료. 익명 신고 도구 준비 중.",
            recentMessages: "📩 최근 유해 메시지",
            noMessages: "유해 메시지 없음.",
            threatLevel: "위협 수준"
        },
        fr: {
            artistsTitle: "Artistes suivis",
            totalMessages: "Messages totaux",
            toxicMessages: "Messages toxiques",
            artistsAlert: "Artistes sous alerte",
            nationalToxicity: "Taux de toxicité national",
            totalThreats: "Menaces totales",
            bullyingIndicators: "Indicateurs de harcèlement",
            studentsMonitored: "Élèves suivis",
            criticalAlerts: "⚠️ Alertes critiques",
            escalate: "Notifier le conseiller",
            guidance: "Guide : En cas de menace de mort, exportez les preuves et contactez la police (112).",
            schoolGuidance: "Ressources de prévention du cyberharcèlement. Signalement anonyme à venir.",
            recentMessages: "📩 Derniers messages toxiques",
            noMessages: "Aucun message toxique pour l'instant.",
            threatLevel: "Niveau de menace"
        }
    };

    let currentLang = localStorage.getItem('lang') || 'en';
    let currentTab = 'agency';
    let statsData = null;
    let messagesData = [];
    let toxicityChart = null;

    const API_BASE = 'https://ktoxguard-api-production.up.railway.app';

    function computeMemberThreatLevel(memberName, messages) {
        const nameLower = memberName.toLowerCase();
        let count = 0;
        messages.forEach(m => {
            if (m.label === 'toxique' && m.text.toLowerCase().includes(nameLower)) count++;
        });
        if (count === 0) return { label: 'Calm', class: 'threat-low', value: 0 };
        if (count < 3) return { label: 'Vigilance', class: 'threat-medium', value: 1 };
        return { label: 'Critical', class: 'threat-high', value: 2 };
    }

    async function fetchData() {
        try {
            const [statsRes, messagesRes] = await Promise.all([
                fetch(`${API_BASE}/stats`),
                fetch(`${API_BASE}/messages?limit=80`)
            ]);
            statsData = await statsRes.json();
            messagesData = await messagesRes.json();
        } catch (err) {
            console.error(err);
            statsData = { total_messages: 0, toxic_count: 0, toxic_percentage: 0 };
            messagesData = [];
        }
        renderDashboard();
    }

    function renderDashboard() {
        if (!statsData) return;
        const t = translations[currentLang];
        document.getElementById('artistsTitle').innerText = t.artistsTitle;
        document.getElementById('recentMessagesTitle').innerHTML = t.recentMessages;

        // Stats
        const statsGrid = document.getElementById('statsGrid');
        if (currentTab === 'agency') {
            let totalUnderAlert = 0;
            groups.forEach(g => g.members.forEach(m => {
                const threat = computeMemberThreatLevel(m, messagesData);
                if (threat.class !== 'threat-low') totalUnderAlert++;
            }));
            statsGrid.innerHTML = `
                <div class="stat-card"><h4>${t.totalMessages}</h4><div class="value">${statsData.total_messages}</div></div>
                <div class="stat-card"><h4>${t.toxicMessages}</h4><div class="value">${statsData.toxic_count}</div></div>
                <div class="stat-card"><h4>${t.artistsAlert}</h4><div class="value">${totalUnderAlert}</div></div>
            `;
        } else if (currentTab === 'government') {
            statsGrid.innerHTML = `
                <div class="stat-card"><h4>${t.nationalToxicity}</h4><div class="value">${statsData.toxic_percentage}%</div></div>
                <div class="stat-card"><h4>${t.totalThreats}</h4><div class="value">${statsData.toxic_count}</div></div>
            `;
        } else {
            const bullyingCount = messagesData.filter(m => m.label === 'toxique' && (m.text.includes('왕따') || m.text.includes('학폭') || m.text.includes('bully'))).length;
            statsGrid.innerHTML = `
                <div class="stat-card"><h4>${t.bullyingIndicators}</h4><div class="value">${bullyingCount}</div></div>
                <div class="stat-card"><h4>${t.studentsMonitored}</h4><div class="value">5</div></div>
            `;
        }

        // Artists
        const artistsGrid = document.getElementById('artistsGrid');
        if (currentTab === 'agency') {
            let html = '';
            groups.forEach(group => {
                html += `<div class="group-block">`;
                html += `<div class="group-header"><img src="${group.logo}" alt="${group.name}" onerror="this.src='https://via.placeholder.com/60/3B82F6/F9FAFB?text=${group.name.charAt(0)}'"><h2>${group.name}</h2></div>`;
                html += `<div class="artist-grid">`;
                group.members.forEach(member => {
                    const threat = computeMemberThreatLevel(member, messagesData);
                    const photo = getMemberPhoto(member);
                    html += `
                        <div class="artist-card">
                            <img src="${photo}" alt="${member}" onerror="this.src='https://via.placeholder.com/90/3B82F6/F9FAFB?text=${member.charAt(0)}'">
                            <h4>${member}</h4>
                            <div class="group-name">${group.name}</div>
                            <div class="threat-badge ${threat.class}">${threat.label}</div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });
            artistsGrid.innerHTML = html;
        } else {
            artistsGrid.innerHTML = `<div class="soon-card" style="width:100%;">${t.guidance}</div>`;
        }

        // Extra
        const extraDiv = document.getElementById('extraSection');
        if (currentTab === 'agency') {
            extraDiv.innerHTML = `<div style="background:#111827; border-radius:28px; padding:1rem; margin-top:1rem;"><canvas id="toxicityChart" width="400" height="200"></canvas></div>`;
            if (toxicityChart) toxicityChart.destroy();
            const chartCanvas = document.getElementById('toxicityChart');
            if (chartCanvas) {
                toxicityChart = new Chart(chartCanvas, {
                    type: 'line',
                    data: {
                        labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                        datasets: [{ label: 'Toxicity %', data: [12, 19, 15, statsData.toxic_percentage], borderColor: '#3B82F6', backgroundColor: 'rgba(59,130,246,0.1)', tension: 0.3, fill: true }]
                    },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }
        } else if (currentTab === 'government') {
            let death=0, doxx=0, hate=0;
            messagesData.forEach(m => {
                if (m.label === 'toxique') {
                    if (m.text.includes('kill') || m.text.includes('죽어')) death++;
                    if (m.text.includes('신상')) doxx++;
                    if (m.text.includes('병신') || m.text.includes('stupid')) hate++;
                }
            });
            extraDiv.innerHTML = `
                <div class="stats-grid" style="margin-top:1rem;">
                    <div class="stat-card"><h4>Death threats</h4><div class="value">${death}</div></div>
                    <div class="stat-card"><h4>Doxxing</h4><div class="value">${doxx}</div></div>
                    <div class="stat-card"><h4>Hate speech</h4><div class="value">${hate}</div></div>
                </div>
                <div class="soon-card">🗺️ Geographic heatmap – coming soon</div>
            `;
        } else {
            const schoolBullyingMessages = messagesData.filter(m => m.label === 'toxique' && (m.text.includes('왕따') || m.text.includes('학폭') || m.text.includes('bully')));
            extraDiv.innerHTML = `
                <div class="messages-panel" style="margin-top:0;">
                    <h3>⚠️ School‑related threats</h3>
                    ${schoolBullyingMessages.length ? schoolBullyingMessages.slice(0,5).map(m => `<div class="message-item"><div class="message-meta">${m.platform} · ${m.author}</div><div class="message-text">${m.text.substring(0,150)}</div></div>`).join('') : '<p>No bullying mentions</p>'}
                    <button class="lang-btn" style="margin-top:1rem; background:#3B82F6; border:none; padding:8px 20px; border-radius:40px; color:#fff; cursor:pointer;" onclick="alert('Notify counselor')">${t.escalate}</button>
                </div>
                <div class="soon-card">${t.schoolGuidance}</div>
            `;
        }

        // Messages
        const toxicMessages = messagesData.filter(m => m.label === 'toxique');
        const messagesList = document.getElementById('messagesList');
        if (toxicMessages.length === 0) {
            messagesList.innerHTML = `<div class="soon-card" style="margin:0;">${t.noMessages}</div>`;
        } else {
            messagesList.innerHTML = toxicMessages.slice(0,15).map(msg => `
                <div class="message-item">
                    <div class="message-meta">
                        <span>📅 ${new Date(msg.timestamp).toLocaleDateString()}</span>
                        <span>👤 ${msg.author || 'anonymous'}</span>
                    </div>
                    <div class="message-text">${msg.text.substring(0,200)}</div>
                    <div><span class="toxique-badge">${msg.label}</span> (conf: ${msg.confidence})</div>
                </div>
            `).join('');
        }
    }

    // Language
    function initLang() {
        const dropdown = document.getElementById('langDropdown');
        const btn = document.getElementById('langBtn');
        btn.addEventListener('click', () => dropdown.classList.toggle('active'));
        document.querySelectorAll('.lang-menu button').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.getAttribute('data-lang');
                currentLang = lang;
                localStorage.setItem('lang', lang);
                document.getElementById('currentLangLabel').innerText = lang.toUpperCase();
                dropdown.classList.remove('active');
                renderDashboard();
            });
        });
        document.getElementById('currentLangLabel').innerText = currentLang.toUpperCase();
        window.addEventListener('click', (e) => { if (!dropdown.contains(e.target)) dropdown.classList.remove('active'); });
    }

    function initTabs() {
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.getAttribute('data-tab');
                renderDashboard();
            });
        });
    }

    initLang();
    initTabs();
    fetchData();
    setInterval(fetchData, 10000);
</script>
</body>
</html>
